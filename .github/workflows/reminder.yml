name: Bucket List Benachrichtigungen

on:
  schedule:
    - cron: '*/5 * * * *'  # alle 5 Minuten
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install node-fetch@3 nodemailer

      - name: Run notification script
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:    ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT_2:     ${{ secrets.RECIPIENT_2 }}
        run: node scripts/notify.mjs
